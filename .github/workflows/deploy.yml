name: Build & Deploy Jorah

on:
  schedule:
    - cron: "17 * * * *" # toutes les heures à h+17
  workflow_dispatch: # bouton de lancement manuel
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Restaurer le cache de traductions
        uses: actions/cache@v4
        with:
          path: translations.json
          key: jorah-translations-${{ github.run_id }}
          restore-keys: |
            jorah-translations-
      - name: Installer les dépendances
        run: npm install --no-audit --no-fund
      - name: Générer le site
        run: node build.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
